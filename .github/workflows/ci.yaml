name: CI

on:
  push: ~

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16.20.0
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16.20.0
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn build

  test-utils:
    strategy:
      matrix:
        node-version: [16.20.0, 18.16.0]
    runs-on: ubuntu-20.04
    steps:
      - run: sudo apt update && sudo apt install ansible
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test:utils

  test-generators:
    strategy:
      matrix:
        generator:
          - app
          - express
          - flutter-mobile
          - next-js
          - react
          - react-admin
          - react-native-mobile
          - root
          - symfony
    runs-on: ubuntu-20.04
    steps:
      - uses: azure/setup-helm@v1
        with:
          version: 3.8.0
      - uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.1.2
      - run: git config --global init.defaultBranch main
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16.20.0
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: node --test --loader ts-node/esm --experimental-specifier-resolution=node generators/${{ matrix.generator }}/index.test.ts

  test-update-script:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2
      - uses: denoland/setup-deno@v1
      - name: Update version
        run: ./scripts/updateNode.ts
